<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud & AI/ML Engineer Roadmap 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const phases = [
      {
        id: 1, title: "Foundations", subtitle: "Months 1–2", color: "#00FFB2", icon: "🧱",
        modules: [
          { title: "DSA — Light & Targeted", depth: "Core", concepts: [
            { name: "Arrays & HashMaps", detail: "Two-pointer, sliding window, frequency maps — the bread and butter of coding screens at startups" },
            { name: "Stacks & Queues", detail: "Monotonic stacks, deque patterns, BFS queue — comes up in pipeline/task scheduling logic" },
            { name: "Linked Lists", detail: "Fast/slow pointer, reversal, merge — classic screening questions, 1–2 hours to be solid" },
            { name: "Trees & Recursion", detail: "Binary trees, DFS/BFS traversal, recursion patterns — base for understanding ML tree models too" },
            { name: "Graph Traversal", detail: "BFS, DFS, topological sort — directly applies to DAG-based ML pipeline orchestration (Airflow, Kubeflow)" },
            { name: "Sorting & Searching", detail: "QuickSort, MergeSort, Binary Search — know time/space complexity of each, O(n log n) intuition" },
            { name: "Dynamic Programming (Light)", detail: "Memoization, tabulation — only need Easy/Medium DP; skip advanced DP for MLOps roles" },
          ]},
          { title: "Operating Systems", depth: "Core", concepts: [
            { name: "Processes vs Threads", detail: "Fork, exec, PID, process states, context switching — critical for understanding containers and parallel training" },
            { name: "Memory Management", detail: "Virtual memory, heap vs stack, paging, memory leaks — needed when debugging OOM kills in Kubernetes pods" },
            { name: "File Systems & I/O", detail: "inodes, file descriptors, buffered vs unbuffered I/O, /proc filesystem — daily tools in MLOps debugging" },
            { name: "Signals & IPC", detail: "SIGTERM, SIGKILL, pipes, sockets, shared memory — how containers communicate and shut down gracefully" },
            { name: "Scheduling", detail: "CPU scheduling algorithms, nice values, cgroups — underpins Kubernetes resource limits and requests" },
            { name: "Concurrency & Locks", detail: "Mutex, semaphore, deadlock, race conditions — essential for writing safe multi-threaded ML data loaders" },
          ]},
          { title: "Networking Fundamentals", depth: "Core", concepts: [
            { name: "OSI & TCP/IP Model", detail: "Layers 1–7, where each protocol lives — mental model for debugging any cloud connectivity issue" },
            { name: "DNS & HTTP/HTTPS", detail: "How DNS resolution works, HTTP verbs, status codes, TLS handshake — you'll configure this in every deployment" },
            { name: "TCP vs UDP", detail: "Connection-oriented vs connectionless, 3-way handshake, why gRPC uses HTTP/2 over TCP" },
            { name: "Load Balancers & Proxies", detail: "L4 vs L7 load balancing, reverse proxies (Nginx), sticky sessions — core to serving ML models at scale" },
            { name: "REST vs gRPC", detail: "JSON over HTTP vs Protobuf over HTTP/2 — gRPC is preferred for high-throughput ML inference APIs" },
            { name: "VPC & Subnets", detail: "CIDR blocks, public vs private subnets, NAT gateway, security groups — AWS VPC design for ML infrastructure" },
            { name: "Ports & Firewalls", detail: "Well-known ports, iptables basics, security groups vs NACLs — debugging unreachable services in the cloud" },
          ]},
          { title: "Linux & Bash Mastery", depth: "Deep", concepts: [
            { name: "File System Navigation", detail: "ls, find, locate, tree, du, df — knowing your way around a Linux filesystem blindfolded" },
            { name: "Permissions & Users", detail: "chmod, chown, sudo, /etc/passwd, groups, umask — essential for container security and CI/CD runners" },
            { name: "Process Management", detail: "ps, top, htop, kill, nice, nohup, &, jobs — monitoring and controlling ML training jobs on remote servers" },
            { name: "Shell Scripting", detail: "Variables, loops, conditionals, functions, $?, pipelines — automating deployments, data prep, cron jobs" },
            { name: "Networking Tools", detail: "curl, wget, netstat, ss, ping, traceroute, nslookup, tcpdump — debugging cloud connectivity issues" },
            { name: "systemd & Services", detail: "systemctl, journalctl, unit files — managing long-running ML services on VMs" },
            { name: "Text Processing", detail: "grep, awk, sed, cut, sort, uniq, wc — parsing logs, processing large text datasets from command line" },
            { name: "SSH & Remote Work", detail: "ssh keys, scp, rsync, tmux/screen, port forwarding — working with remote GPU servers and cloud VMs daily" },
          ]},
          { title: "Python: Production-Grade", depth: "Deep", concepts: [
            { name: "OOP & Design Patterns", detail: "Classes, inheritance, MRO, SOLID principles, Factory/Singleton/Observer patterns" },
            { name: "Type Hints & Mypy", detail: "PEP 484, dataclasses, Pydantic models, runtime validation" },
            { name: "Async Programming", detail: "asyncio, event loops, coroutines, aiohttp, concurrent.futures" },
            { name: "Testing & TDD", detail: "pytest, fixtures, mocking, parametrize, coverage reports, hypothesis testing" },
            { name: "Clean Architecture", detail: "Modular design, separation of concerns, dependency injection, packaging with pyproject.toml" },
            { name: "Performance & Profiling", detail: "cProfile, memory_profiler, NumPy vectorization, Cython basics" },
          ]},
          { title: "SQL & Data Engineering", depth: "Deep", concepts: [
            { name: "Advanced SQL", detail: "Window functions, CTEs, recursive queries, query optimization, EXPLAIN plans" },
            { name: "Database Internals", detail: "Indexing (B-tree, Hash), MVCC, ACID properties, normalization to 3NF/BCNF" },
            { name: "Data Pipelines", detail: "ETL vs ELT, batch vs streaming, Apache Airflow DAGs, dbt models" },
            { name: "Distributed Storage", detail: "Parquet, Avro, Delta Lake, data lakes vs warehouses, partitioning strategies" },
            { name: "NoSQL Patterns", detail: "MongoDB, Redis, Cassandra — when to use each; CAP theorem" },
          ]},
          { title: "Linear Algebra", depth: "Core", concepts: [
            { name: "Vectors & Spaces", detail: "Basis, span, linear independence, dot product, cosine similarity (used in embeddings)" },
            { name: "Matrix Operations", detail: "Multiplication, transpose, inverse, rank — implemented in NumPy" },
            { name: "Eigendecomposition", detail: "Eigenvalues/eigenvectors, PCA derivation from scratch, SVD" },
            { name: "Tensors", detail: "Understanding PyTorch tensors as generalized matrices, broadcasting rules" },
          ]},
          { title: "Probability & Statistics", depth: "Core", concepts: [
            { name: "Probability Theory", detail: "Bayes theorem, conditional probability, joint/marginal distributions" },
            { name: "Distributions", detail: "Gaussian, Bernoulli, Categorical — MLE and MAP estimation" },
            { name: "Hypothesis Testing", detail: "p-values, confidence intervals, A/B testing, t-test, chi-square" },
            { name: "Information Theory", detail: "Entropy, KL divergence, cross-entropy loss — why models minimize it" },
          ]},
          { title: "Calculus for ML", depth: "Core", concepts: [
            { name: "Derivatives & Chain Rule", detail: "Partial derivatives, Jacobians, Hessians — foundation of backprop" },
            { name: "Gradient Descent", detail: "SGD, momentum, adaptive methods (Adam) — derive update rules" },
            { name: "Computational Graphs", detail: "Forward and backward passes, autograd mechanics in PyTorch" },
          ]},
        ]
      },
      {
        id: 2, title: "Core ML & Deep Learning", subtitle: "Months 2–4", color: "#4D9FFF", icon: "⚙️",
        modules: [
          { title: "Classical ML Mastery", depth: "Deep", concepts: [
            { name: "Supervised Learning", detail: "Linear/Logistic Regression, SVMs, Decision Trees, Random Forest, Gradient Boosting (XGBoost, LightGBM)" },
            { name: "Unsupervised Learning", detail: "K-Means, DBSCAN, Hierarchical clustering, GMM, ICA, autoencoders" },
            { name: "Model Evaluation", detail: "Bias-variance tradeoff, cross-validation, ROC/AUC, precision-recall, confusion matrix" },
            { name: "Feature Engineering", detail: "Encoding, scaling, imputation, feature selection (SHAP, permutation importance)" },
            { name: "Hyperparameter Tuning", detail: "Grid search, random search, Optuna (Bayesian optimization)" },
          ]},
          { title: "PyTorch Deep Dive", depth: "Deep", concepts: [
            { name: "Tensor Operations", detail: "Broadcasting, in-place ops, device management (CPU/GPU), memory layout" },
            { name: "nn.Module Architecture", detail: "Custom layers, parameter management, hooks, forward() design patterns" },
            { name: "Training Loop Mastery", detail: "DataLoader, custom Datasets, gradient accumulation, mixed precision (AMP)" },
            { name: "Optimization", detail: "Learning rate schedulers, gradient clipping, weight decay, SAM optimizer" },
            { name: "Debugging & Profiling", detail: "torch.profiler, anomaly detection, NaN/Inf debugging, torchinfo" },
          ]},
          { title: "Neural Network Architectures", depth: "Deep", concepts: [
            { name: "CNNs", detail: "Conv2d mechanics, receptive fields, ResNet skip connections, EfficientNet, transfer learning" },
            { name: "RNNs & LSTMs", detail: "Vanishing gradients, BPTT, gated mechanisms, sequence-to-sequence" },
            { name: "Transformers from Scratch", detail: "Multi-head attention, positional encoding, encoder-decoder, KV cache" },
            { name: "Vision Transformers", detail: "ViT patch embeddings, CLIP, DINO — how vision meets language" },
            { name: "Generative Models", detail: "VAEs, GANs (training stability), Diffusion models (DDPM), flow matching" },
          ]},
          { title: "End-to-End ML Pipelines", depth: "Practical", concepts: [
            { name: "Data Versioning", detail: "DVC for dataset tracking, data lineage, reproducibility" },
            { name: "Experiment Tracking", detail: "MLflow runs/experiments, Weights & Biases, artifact logging" },
            { name: "Model Serialization", detail: "TorchScript, ONNX export, model versioning best practices" },
            { name: "Kaggle Strategy", detail: "EDA workflow, ensemble methods, leakage detection, pseudo-labeling" },
          ]},
        ]
      },
      {
        id: 3, title: "Cloud + MLOps", subtitle: "Months 4–6", color: "#FF6B6B", icon: "☁️",
        modules: [
          { title: "Docker & Containerization", depth: "Deep", concepts: [
            { name: "Dockerfile Mastery", detail: "Multi-stage builds, layer caching, .dockerignore, non-root users, distroless images" },
            { name: "Networking & Volumes", detail: "Bridge/host networks, bind mounts, named volumes, docker-compose orchestration" },
            { name: "Container Security", detail: "Image scanning (Trivy), secrets management, capability dropping" },
            { name: "GPU Containers", detail: "NVIDIA Docker runtime, CUDA base images, gpu resource allocation" },
          ]},
          { title: "Kubernetes for ML", depth: "Core", concepts: [
            { name: "Core Concepts", detail: "Pods, Deployments, Services, ConfigMaps, Secrets, Namespaces" },
            { name: "ML Workloads", detail: "Jobs, CronJobs for training, StatefulSets, PersistentVolumeClaims for model storage" },
            { name: "Scaling", detail: "HPA, VPA, KEDA for event-driven autoscaling of inference services" },
            { name: "Helm Charts", detail: "Packaging ML apps, templating, values override for environments" },
          ]},
          { title: "AWS for ML Engineers", depth: "Deep", concepts: [
            { name: "Core Services", detail: "EC2 (P/G instances for GPU), S3 (data lake), IAM (least privilege), VPC design" },
            { name: "SageMaker", detail: "Training jobs, hyperparameter tuning, model registry, pipelines, endpoints, Shadow deployments" },
            { name: "Data Services", detail: "Glue ETL, Athena, EMR (Spark), Kinesis for streaming, RDS/DynamoDB" },
            { name: "Serverless ML", detail: "Lambda for inference, API Gateway, Step Functions for orchestration" },
            { name: "Cost Optimization", detail: "Spot instances for training, reserved instances, S3 storage tiers, right-sizing" },
          ]},
          { title: "CI/CD for ML (MLOps)", depth: "Deep", concepts: [
            { name: "ML Pipelines", detail: "MLflow Pipelines, Kubeflow Pipelines, Vertex AI Pipelines — DAG design" },
            { name: "Model Testing", detail: "Data validation (Great Expectations), model unit tests, shadow mode testing" },
            { name: "Monitoring & Drift", detail: "Evidently AI, data drift detection, concept drift, model degradation alerts" },
            { name: "GitHub Actions for ML", detail: "Automated training triggers, model evaluation gates, deployment workflows" },
            { name: "Feature Stores", detail: "Feast, Tecton — online vs offline stores, point-in-time correctness" },
          ]},
          { title: "Cloud Certifications", depth: "Practical", concepts: [
            { name: "AWS Cloud Practitioner", detail: "Core services overview, pricing models, security basics — 3-4 weeks prep" },
            { name: "AWS ML Specialty", detail: "Data engineering, modeling, deployment, monitoring — deep ML focus" },
            { name: "GCP Professional ML", detail: "Vertex AI, BigQuery ML, TensorFlow on GCP, MLOps on GCP" },
          ]},
        ]
      },
      {
        id: 4, title: "Modern AI Stack", subtitle: "Months 6–9", color: "#C77DFF", icon: "🤖",
        modules: [
          { title: "LLMs: Deep Understanding", depth: "Deep", concepts: [
            { name: "Pre-training & Architecture", detail: "GPT vs BERT, tokenization (BPE, SentencePiece), scaling laws, emergent abilities" },
            { name: "Fine-tuning Techniques", detail: "Full fine-tuning, LoRA, QLoRA, instruction tuning, RLHF, DPO, PPO" },
            { name: "Inference Optimization", detail: "Quantization (INT8, INT4), KV-cache optimization, speculative decoding, vLLM" },
            { name: "Evaluation", detail: "MMLU, HumanEval, BIG-bench, LLM-as-judge, evals design, red-teaming" },
            { name: "Open Source Models", detail: "Llama 3, Mistral, Gemma — running locally with Ollama, GGUF format" },
          ]},
          { title: "RAG Systems (Production)", depth: "Deep", concepts: [
            { name: "Chunking Strategies", detail: "Fixed-size, recursive, semantic chunking, late chunking — tradeoffs" },
            { name: "Embedding Models", detail: "text-embedding-3, BGE, E5 — fine-tuning embeddings for domain data" },
            { name: "Vector Databases", detail: "Pinecone, Milvus, Qdrant, pgvector — HNSW index, ANN search, metadata filtering" },
            { name: "Retrieval Techniques", detail: "Hybrid search (BM25 + dense), reranking (Cohere, cross-encoders), HyDE, multi-query" },
            { name: "RAG Evaluation", detail: "RAGAS framework — faithfulness, answer relevancy, context precision metrics" },
            { name: "Advanced RAG", detail: "GraphRAG, agentic RAG, corrective RAG, self-RAG — know the taxonomy" },
          ]},
          { title: "Agentic AI Systems", depth: "Deep", concepts: [
            { name: "Agent Architecture", detail: "ReAct pattern, tool calling, function schemas, planning loops, memory systems" },
            { name: "LangChain Deep Dive", detail: "LCEL chains, custom tools, retrievers, callbacks, LangSmith tracing" },
            { name: "LangGraph", detail: "State machines for agents, cycles, human-in-the-loop, multi-agent graphs" },
            { name: "AutoGen / CrewAI", detail: "Multi-agent coordination, role assignment, group chat patterns" },
            { name: "Guardrails & Safety", detail: "Output validation, Guardrails AI, NeMo Guardrails, hallucination detection" },
            { name: "Memory Systems", detail: "Short-term (context), long-term (vector store), episodic (event logs), semantic memory" },
          ]},
          { title: "LLM APIs & Prompt Engineering", depth: "Core", concepts: [
            { name: "API Mastery", detail: "OpenAI, Anthropic, Gemini — streaming, function calling, vision, structured outputs" },
            { name: "Prompt Engineering", detail: "Chain-of-thought, few-shot, system prompts, meta-prompting, adversarial prompting" },
            { name: "Cost & Latency Optimization", detail: "Prompt caching, token counting, batching, model routing (cheap vs expensive)" },
            { name: "Observability", detail: "LangSmith, Phoenix (Arize), tracing, span tracking, cost dashboards" },
          ]},
        ]
      },
      {
        id: 5, title: "Portfolio & Career", subtitle: "Months 9–12", color: "#FFD166", icon: "🏗️",
        modules: [
          { title: "Portfolio Projects (Tier 1)", depth: "Practical", concepts: [
            { name: "Cloud ML API", detail: "Train model → containerize → deploy to AWS ECS/Lambda → API Gateway → monitoring dashboard" },
            { name: "RAG Chatbot", detail: "Ingest PDFs → chunk → embed → store in Pinecone → FastAPI backend → Streamlit UI → deploy" },
            { name: "AI Agent", detail: "Tool-using agent with web search + calculator + code executor → LangGraph state machine → deployed" },
          ]},
          { title: "Engineering Best Practices", depth: "Deep", concepts: [
            { name: "System Design for ML", detail: "Feature pipelines, model serving (online vs batch), caching layers, A/B test infrastructure" },
            { name: "API Design", detail: "FastAPI, REST vs gRPC, async endpoints, rate limiting, auth (JWT/OAuth), OpenAPI docs" },
            { name: "Observability Stack", detail: "Prometheus + Grafana, structured logging (structlog), distributed tracing (OpenTelemetry)" },
            { name: "Security for ML", detail: "Prompt injection defense, model theft prevention, data privacy (PII scrubbing), GDPR basics" },
          ]},
          { title: "Interview Preparation", depth: "Practical", concepts: [
            { name: "ML System Design", detail: "Design a recommendation system, fraud detection system, search ranking — practice 20+ problems" },
            { name: "Coding Interviews", detail: "LeetCode Medium (arrays, graphs, DP), ML coding (implement backprop, attention, k-means)" },
            { name: "ML Theory", detail: "Be ready to derive gradient descent, explain attention mechanism, bias-variance decomposition" },
            { name: "Behavioral (STAR)", detail: "Projects, failures, disagreements — frame everything around measurable impact" },
          ]},
          { title: "Career Strategy", depth: "Practical", concepts: [
            { name: "GitHub Presence", detail: "Pinned repos with READMEs, demos, architecture diagrams — treat it as a product" },
            { name: "LinkedIn Optimization", detail: "Keywords: MLOps, LLMOps, RAG, SageMaker, PyTorch — recruiters search these" },
            { name: "Target Companies", detail: "Big Tech (FAANG), AI Labs (OpenAI, Anthropic, Cohere), MLOps startups, AI unicorns" },
            { name: "Open Source Contributions", detail: "Fix issues in LangChain, Hugging Face, MLflow — shows real-world collaboration" },
          ]},
        ]
      }
    ];

    const STORAGE_KEY = 'tanmoy_roadmap_progress_v1';
    const PHASE_KEY   = 'tanmoy_roadmap_phase_v1';

    function loadProgress() {
      try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }
      catch(e) { return {}; }
    }

    function loadPhase() {
      try { const raw = localStorage.getItem(PHASE_KEY); return raw !== null ? parseInt(raw, 10) : 0; }
      catch(e) { return 0; }
    }

    function Roadmap() {
      const [activePhase, setActivePhase] = useState(() => loadPhase());
      const [activeModule, setActiveModule] = useState(null);
      const [completedConcepts, setCompletedConcepts] = useState(() => loadProgress());
      const [saveFlash, setSaveFlash] = useState(false);

      const phase = phases[activePhase];

      const switchPhase = (i) => {
        setActivePhase(i);
        setActiveModule(null);
        try { localStorage.setItem(PHASE_KEY, String(i)); } catch(e) {}
      };

      const toggleConcept = (phaseId, moduleIdx, conceptIdx) => {
        const key = `${phaseId}-${moduleIdx}-${conceptIdx}`;
        setCompletedConcepts(prev => {
          const updated = { ...prev, [key]: !prev[key] };
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
            setSaveFlash(true);
            setTimeout(() => setSaveFlash(false), 1200);
          } catch(e) {}
          return updated;
        });
      };

      const resetAll = () => {
        if (!window.confirm('Reset ALL progress? This cannot be undone.')) return;
        setCompletedConcepts({});
        try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(PHASE_KEY); } catch(e) {}
      };

      const getPhaseProgress = (p) => {
        let total = 0, done = 0;
        p.modules.forEach((m, mi) => m.concepts.forEach((_, ci) => {
          total++;
          if (completedConcepts[`${p.id}-${mi}-${ci}`]) done++;
        }));
        return total ? Math.round((done / total) * 100) : 0;
      };

      const totalProgress = Math.round(phases.reduce((acc, p) => acc + getPhaseProgress(p), 0) / phases.length);

      return (
        <div style={{ fontFamily: "'Courier New', monospace", background: "#0a0a0f", minHeight: "100vh", color: "#e0e0e0" }}>

          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #0d0d1a 0%, #111128 100%)", borderBottom: "1px solid #222", padding: "20px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
            <div>
              <div style={{ fontSize: "10px", letterSpacing: "4px", color: "#555", marginBottom: "3px", textTransform: "uppercase" }}>Career Roadmap 2026</div>
              <h1 style={{ margin: 0, fontSize: "clamp(16px, 2.5vw, 22px)", fontWeight: "700", color: "#fff", letterSpacing: "-0.5px" }}>Cloud & AI/ML Engineer</h1>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
              {saveFlash && (
                <div style={{ fontSize: "11px", color: "#00FFB2", background: "#00FFB218", border: "1px solid #00FFB244", borderRadius: "6px", padding: "4px 10px", transition: "opacity 0.3s" }}>
                  ✓ Saved
                </div>
              )}
              <button onClick={resetAll} style={{ fontSize: "10px", color: "#555", background: "transparent", border: "1px solid #222", borderRadius: "6px", padding: "4px 10px", cursor: "pointer", fontFamily: "inherit", letterSpacing: "1px" }}>
                RESET
              </button>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: "10px", color: "#555", letterSpacing: "2px" }}>OVERALL</div>
                <div style={{ fontSize: "26px", fontWeight: "700", color: "#00FFB2", lineHeight: 1 }}>{totalProgress}%</div>
              </div>
              <div style={{ width: "56px", height: "56px", borderRadius: "50%", border: "3px solid #1a1a2e", background: `conic-gradient(#00FFB2 ${totalProgress * 3.6}deg, #1a1a2e ${totalProgress * 3.6}deg)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ width: "44px", height: "44px", borderRadius: "50%", background: "#0d0d1a" }} />
              </div>
            </div>
          </div>

          {/* Phase Tabs */}
          <div style={{ display: "flex", overflowX: "auto", background: "#0d0d1a", borderBottom: "1px solid #1a1a2e", padding: "0 12px", gap: "2px" }}>
            {phases.map((p, i) => {
              const prog = getPhaseProgress(p);
              const isActive = i === activePhase;
              return (
                <button key={p.id} onClick={() => switchPhase(i)}
                  style={{ background: isActive ? "#111128" : "transparent", border: "none", borderBottom: isActive ? `2px solid ${p.color}` : "2px solid transparent", color: isActive ? p.color : "#555", padding: "12px 14px", cursor: "pointer", whiteSpace: "nowrap", fontSize: "11px", fontFamily: "inherit", fontWeight: isActive ? "700" : "400", letterSpacing: "0.5px", transition: "all 0.2s", display: "flex", alignItems: "center", gap: "6px", flexShrink: 0 }}>
                  <span>{p.icon}</span>
                  <span>Ph.{p.id} {p.title}</span>
                  <span style={{ background: prog === 100 ? p.color : "#1a1a2e", color: prog === 100 ? "#000" : "#555", borderRadius: "10px", padding: "1px 6px", fontSize: "9px" }}>{prog}%</span>
                </button>
              );
            })}
          </div>

          {/* Body */}
          <div style={{ display: "flex", minHeight: "calc(100vh - 148px)" }}>

            {/* Sidebar */}
            <div style={{ width: "260px", flexShrink: 0, background: "#0d0d1a", borderRight: "1px solid #1a1a2e", padding: "14px 0", overflowY: "auto" }}>
              <div style={{ padding: "0 14px 10px", borderBottom: "1px solid #1a1a2e", marginBottom: "6px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "3px", color: "#555", textTransform: "uppercase" }}>{phase.icon} {phase.title}</div>
                <div style={{ fontSize: "11px", color: "#444", marginTop: "2px" }}>{phase.subtitle}</div>
                <div style={{ marginTop: "8px", height: "3px", background: "#1a1a2e", borderRadius: "2px" }}>
                  <div style={{ height: "100%", width: `${getPhaseProgress(phase)}%`, background: phase.color, borderRadius: "2px", transition: "width 0.4s" }} />
                </div>
              </div>
              {phase.modules.map((mod, mi) => {
                const modDone = mod.concepts.filter((_, ci) => completedConcepts[`${phase.id}-${mi}-${ci}`]).length;
                const isActive = activeModule === mi;
                return (
                  <button key={mi} onClick={() => setActiveModule(isActive ? null : mi)}
                    style={{ width: "100%", textAlign: "left", background: isActive ? "#111128" : "transparent", border: "none", borderLeft: isActive ? `3px solid ${phase.color}` : "3px solid transparent", padding: "10px 14px", cursor: "pointer", transition: "all 0.15s" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ fontSize: "12px", color: isActive ? phase.color : "#bbb", fontWeight: isActive ? "700" : "400", fontFamily: "inherit" }}>{mod.title}</div>
                      <span style={{ fontSize: "9px", color: mod.depth === "Deep" ? "#ff6b6b" : mod.depth === "Core" ? "#4d9fff" : "#ffb347", background: mod.depth === "Deep" ? "#ff6b6b18" : mod.depth === "Core" ? "#4d9fff18" : "#ffb34718", padding: "2px 5px", borderRadius: "4px" }}>{mod.depth}</span>
                    </div>
                    <div style={{ fontSize: "10px", color: "#444", marginTop: "3px" }}>{modDone}/{mod.concepts.length} done</div>
                    <div style={{ marginTop: "5px", height: "2px", background: "#1a1a2e", borderRadius: "1px" }}>
                      <div style={{ height: "100%", width: `${(modDone / mod.concepts.length) * 100}%`, background: phase.color, borderRadius: "1px", transition: "width 0.3s" }} />
                    </div>
                  </button>
                );
              })}
            </div>

            {/* Main Panel */}
            <div style={{ flex: 1, padding: "20px", overflowY: "auto", background: "#0a0a0f" }}>
              {activeModule === null ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "14px" }}>
                  {phase.modules.map((mod, mi) => {
                    const modDone = mod.concepts.filter((_, ci) => completedConcepts[`${phase.id}-${mi}-${ci}`]).length;
                    return (
                      <div key={mi} onClick={() => setActiveModule(mi)}
                        onMouseEnter={e => e.currentTarget.style.borderColor = phase.color}
                        onMouseLeave={e => e.currentTarget.style.borderColor = "#1a1a2e"}
                        style={{ background: "#111128", border: "1px solid #1a1a2e", borderRadius: "10px", padding: "18px", cursor: "pointer", transition: "border-color 0.2s" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "8px" }}>
                          <div style={{ fontSize: "13px", fontWeight: "700", color: "#fff" }}>{mod.title}</div>
                          <span style={{ fontSize: "9px", color: mod.depth === "Deep" ? "#ff6b6b" : mod.depth === "Core" ? "#4d9fff" : "#ffb347", background: mod.depth === "Deep" ? "#ff6b6b18" : mod.depth === "Core" ? "#4d9fff18" : "#ffb34718", padding: "2px 6px", borderRadius: "4px", whiteSpace: "nowrap", marginLeft: "8px" }}>{mod.depth}</span>
                        </div>
                        <div style={{ fontSize: "11px", color: "#555", marginBottom: "10px" }}>{mod.concepts.length} concepts</div>
                        {mod.concepts.slice(0, 3).map((c, ci) => (
                          <div key={ci} style={{ fontSize: "11px", color: completedConcepts[`${phase.id}-${mi}-${ci}`] ? phase.color : "#444", marginBottom: "3px", display: "flex", gap: "6px" }}>
                            <span>{completedConcepts[`${phase.id}-${mi}-${ci}`] ? "✓" : "○"}</span><span>{c.name}</span>
                          </div>
                        ))}
                        {mod.concepts.length > 3 && <div style={{ fontSize: "10px", color: "#333", marginTop: "3px" }}>+{mod.concepts.length - 3} more...</div>}
                        <div style={{ marginTop: "12px", height: "3px", background: "#1a1a2e", borderRadius: "2px" }}>
                          <div style={{ height: "100%", width: `${(modDone / mod.concepts.length) * 100}%`, background: phase.color, borderRadius: "2px" }} />
                        </div>
                        <div style={{ fontSize: "10px", color: "#444", marginTop: "4px" }}>{modDone}/{mod.concepts.length} complete</div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px" }}>
                    <button onClick={() => setActiveModule(null)} style={{ background: "#111128", border: "1px solid #222", color: "#888", padding: "5px 10px", borderRadius: "6px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit" }}>← Back</button>
                    <div>
                      <h2 style={{ margin: 0, fontSize: "16px", color: "#fff" }}>{phase.modules[activeModule].title}</h2>
                      <div style={{ fontSize: "10px", color: "#555", marginTop: "2px" }}>Click to mark as learned</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                    {phase.modules[activeModule].concepts.map((concept, ci) => {
                      const key = `${phase.id}-${activeModule}-${ci}`;
                      const done = completedConcepts[key];
                      return (
                        <div key={ci} onClick={() => toggleConcept(phase.id, activeModule, ci)}
                          style={{ background: done ? `${phase.color}12` : "#111128", border: `1px solid ${done ? phase.color + "44" : "#1a1a2e"}`, borderRadius: "10px", padding: "16px 18px", cursor: "pointer", transition: "all 0.2s", display: "flex", gap: "14px", alignItems: "flex-start" }}>
                          <div style={{ width: "20px", height: "20px", borderRadius: "50%", flexShrink: 0, border: `2px solid ${done ? phase.color : "#333"}`, background: done ? phase.color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", color: done ? "#000" : "transparent", transition: "all 0.2s", marginTop: "1px" }}>✓</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: "13px", fontWeight: "700", color: done ? phase.color : "#ddd", marginBottom: "5px" }}>{concept.name}</div>
                            <div style={{ fontSize: "11px", color: "#666", lineHeight: "1.6" }}>{concept.detail}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Roadmap />);
  </script>
</body>
</html>
